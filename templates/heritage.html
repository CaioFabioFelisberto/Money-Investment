<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wealth Composition</title>
    <link rel="stylesheet" href="{{url_for('static', filename='styles.css')}}">
    <link rel="stylesheet" href="{{url_for('static', filename='heritage.css')}}">
</head>
<body class="page-calc page-heritage">
    <main class="layout calc-layout">
        <header class="page-header">
            <a class="back-link" href="{{url_for('index')}}">Back to dashboard</a>
            <h1>Wealth Composition</h1>
            <p>
                Discover how much of your final amount comes from contributions and how much
                is generated by returns over time.
            </p>
        </header>

        <section class="form-card">
            <form action="{{url_for('heritage_composition')}}" method="POST" class="investment-form">
                <div class="form-field">
                    <label for="amount">Monthly contribution (R$)</label>
                    <input type="number" id="amount" name="amount" step="0.01" min="1" placeholder="e.g. 700" required>
                </div>

                <div class="form-field">
                    <label for="months">Time horizon (months)</label>
                    <input type="number" id="months" name="months" min="1" placeholder="e.g. 60" required>
                </div>

                <div class="form-action">
                    <button type="submit">Build composition</button>
                </div>
            </form>
        </section>

        {% if plot %}
            <section class="chart-card">
                {{plot | safe}}
            </section>
        {% else %}
            <section class="chart-card empty-chart">
                <p>Enter your values to see the split between contributed capital and earned interest.</p>
            </section>
        {% endif %}
    </main>
</body>
</html>
